spring.application.name=backend
server.port=8080

# ==========================================
# 1. DATABASE CONNECTION
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# 2. HIBERNATE SETTINGS
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# 3. EXTERNAL API (SerpApi)
# ==========================================
app.data.source=external
app.serpapi.key=${SERPAPI_KEY}

# ==========================================
# 4. EMAIL SETTINGS (Gmail SMTP)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ==========================================
# 5. PRODUCTION CONFIGURATION
# ==========================================
app.async.core-pool-size=10
app.async.max-pool-size=50
app.async.queue-capacity=1000
app.scheduling.enabled=true

# CORS 
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# AI Settings (Gemini)
gemini.api.key=${GEMINI_API_KEY}
ai.rate.limit.per.hour=80
ai.max.query.length=500

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=5m