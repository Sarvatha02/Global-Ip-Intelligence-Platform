services:
  # 1. Backend (Java Spring Boot)
  - type: web
    name: ip-platform-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      # We build the JDBC URL using the individual pieces from Render's Database
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: global-ip-db
          property: host
      - key: SPRING_DATASOURCE_DB_NAME
        fromDatabase:
          name: global-ip-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: global-ip-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: global-ip-db
          property: password
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CONFIG_JSON
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://ip-platform-frontend.onrender.com

  # 2. Frontend (Static Site)
  - type: static
    name: ip-platform-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: NPM_CONFIG_LEGACY_PEER_DEPS # Prevents build errors
        value: "true"
      - key: VITE_API_BASE_URL
        value: https://ip-platform-backend.onrender.com/api

databases:
  - name: global-ip-db
    plan: free
