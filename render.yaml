services:
  # 1. Backend (Docker)
  - type: web
    name: ip-platform-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        fromDatabase:
          name: ip-platform-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: ip-platform-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ip-platform-db
          property: password
      - key: GEMINI_API_KEY
      - key: SERPAPI_KEY
      - key: MAIL_USERNAME
      - key: MAIL_PASSWORD
      - key: FIREBASE_CONFIG_JSON
      - key: CORS_ALLOWED_ORIGINS
        value: https://ip-platform-frontend.onrender.com

  # 2. Frontend (Static Site)
  - type: static
    name: ip-platform-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ip-platform-backend.onrender.com/api
      - key: VITE_RAZORPAY_KEY_ID
      - key: VITE_FIREBASE_API_KEY
      - key: VITE_FIREBASE_AUTH_DOMAIN
      - key: VITE_FIREBASE_PROJECT_ID
      - key: VITE_FIREBASE_STORAGE_BUCKET
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
      - key: VITE_FIREBASE_APP_ID

databases:
  - name: ip-platform-db
    plan: free
